version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # Let new releases age 7 days before opening update PRs, reducing exposure
    # to supply-chain attacks where a malicious version is published then yanked.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group only minor/patch bumps; major bumps fall outside the groups and get
    # individual PRs, since they are more likely to need code changes.
    groups:
      # Prettier major/minor bumps can reformat code (see trip-split#114), so
      # isolate them into their own PR for standalone review. Listed first to win
      # group precedence; patch bumps don't match update-types here and fall
      # through to dev-dependencies, so trivial Prettier patches still ride along
      # with the normal grouped minor/patch updates.
      prettier:
        patterns:
          - "prettier"
        update-types:
          - "major"
          - "minor"
      dev-dependencies:
        dependency-type: development
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      production-dependencies:
        dependency-type: production
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Let new releases age 7 days before opening update PRs, reducing exposure
    # to supply-chain attacks where a malicious version is published then yanked.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group all GitHub Actions updates together (no patch/minor split).
    groups:
      github-actions:
        patterns:
          - "*"
