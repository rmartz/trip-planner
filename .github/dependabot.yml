version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # Let new releases age 7 days before opening update PRs, reducing exposure
    # to supply-chain attacks where a malicious version is published then yanked.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      dev-dependencies:
        dependency-type: development
        patterns:
          - "*"
      production-dependencies:
        dependency-type: production
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Let new releases age 7 days before opening update PRs, reducing exposure
    # to supply-chain attacks where a malicious version is published then yanked.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
