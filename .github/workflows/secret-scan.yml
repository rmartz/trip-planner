name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  secret-scan:
    uses: rmartz/vercel-deploy-scripts/.github/workflows/secret-scan.yml@v2.3.3
    with:
      config-path: .gitleaks.toml
    secrets: inherit

  validate-config:
    name: Validate deployment config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: node scripts/validate-config.mjs
