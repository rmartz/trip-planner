name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm lint

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm run format:check

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm build

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm tsc

  # PROTECTED INVARIANT: this job must run on every code-touching PR with no
  # `on.pull_request.paths` / `paths-ignore` filter and no path-based `if:`
  # gate. The story files ARE the Storybook test suite (storybookTest()), so
  # running them unconditionally is the always-on regression net that catches a
  # visual/behavioral regression introduced by a *non-Storybook* edit (a
  # component, hook, CSS, or util) — an edit that, by design, does NOT trigger
  # screenshot generation in pr-screenshots.yml. Do NOT path-filter this job to
  # "optimize" CI: that would let such a regression sneak past. See issue #391.
  # (Documentation-only PRs skip the heavy jobs — see #392.)
  storybook-tests:
    name: Storybook Tests
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:storybook
