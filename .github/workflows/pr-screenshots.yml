name: PR Screenshots

on:
  pull_request:

# Requires contents:write to push to gh-screenshots branch.
# Forks get a read-only token regardless of this block, so the job is skipped
# for forked PRs (see the `if:` condition on the job below).
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: screenshots-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  screenshots:
    name: Storybook screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip forked PRs — their GITHUB_TOKEN is read-only and cannot push to
    # gh-screenshots regardless of the permissions block above.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      # Screenshot generation is intentionally gated on changed *.stories.tsx
      # files only. With @storybook/addon-vitest's storybookTest(), the story
      # files ARE the Storybook test suite, so a changed *.stories.tsx file
      # means the *intended* appearance/behavior changed — the screenshots
      # exist for a human to confirm the new result is what was wanted.
      #
      # Non-story edits (a component, hook, CSS, or util) deliberately do NOT
      # trigger screenshot generation here: an *unintended* visual/behavioral
      # regression from such an edit is caught instead by the always-run
      # `storybook-tests` job in ci-actions.yml. Test EXECUTION is the
      # always-on regression net; screenshot GENERATION is the "did we mean to
      # change this?" validation that fires only when the expectation changed.
      # See issue #391 for the full rationale.
      - name: Detect changed story files
        id: stories
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.stories.tsx')
          if [ -z "$CHANGED" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            printf 'files<<EOF\n%s\nEOF\n' "$CHANGED" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/setup
        if: steps.stories.outputs.found == 'true'

      - name: Install Playwright chromium
        if: steps.stories.outputs.found == 'true'
        uses: ./.github/actions/playwright

      - name: Build Storybook
        if: steps.stories.outputs.found == 'true'
        run: pnpm build-storybook

      - name: Capture screenshots and post PR comment
        if: steps.stories.outputs.found == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CHANGED_FILES: ${{ steps.stories.outputs.files }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node .github/scripts/storybook-screenshots.mjs
