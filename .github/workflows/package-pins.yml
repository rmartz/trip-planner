name: Package pins

# Enforce the "full version pin" rule (CLAUDE.md "Dependency pins"): every
# registry dependency in package.json must pin a full major.minor.patch version,
# with an optional `^`/`~` range annotation. This is the ratchet for #403.
#
# An allowlist (`paths`) is safe here because this check has a CLOSED input set:
# its result depends solely on the paths below — the package.json(s) it reads,
# the validator + its library, and this workflow. Nothing outside that set can
# change whether the pins are valid, so the allowlist cannot hide a real failure.
# This intentionally differs from #392, which uses a documentation DENYLIST for
# the heavy test/build jobs: those have an OPEN input set (almost anything can
# affect them), so a run-when allowlist there could skip a real failure.
#
# Absent vs. skipped: on a PR that does not touch these paths the check is
# ABSENT (it never starts) rather than reported as skipped, so it is
# non-blocking and `main` is left unprotected for non-package changes — the same
# rationale as validate-config.yml (#393). That is acceptable because only a
# package.json (or this check itself) can change the outcome.
on:
  pull_request:
    paths:
      - "**/package.json"
      - "scripts/check-package-pins.mjs"
      - "scripts/lib/check-package-pins.mjs"
      - ".github/workflows/package-pins.yml"
  push:
    branches: [main]
    paths:
      - "**/package.json"
      - "scripts/check-package-pins.mjs"
      - "scripts/lib/check-package-pins.mjs"
      - ".github/workflows/package-pins.yml"

permissions:
  contents: read

jobs:
  package-pins:
    name: Check package pins
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      # The check uses only Node built-ins, so no pnpm install / setup is needed.
      - run: node scripts/check-package-pins.mjs
