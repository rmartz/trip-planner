# Public environment variables for the production environment.
#
# Only non-sensitive variables belong here. All keys are validated against
# deployment/schema.yml — sensitive variables (private keys, auth tokens, DSNs)
# will be rejected by the pre-commit hook and CI.
#
# Sensitive variables are managed directly in Vercel and are never committed.
# Run `pnpm env:pull` to generate a local .env.local from Vercel's stored values.
#
# To update these values and sync them to Vercel: scripts/update-config.sh --env=production

environment: production

variables:
  # Firebase Client SDK — safe to expose; access control is enforced by Firebase security rules
  NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyAFQlQQCQde0OnODbz06A2rjk_8F0sCTFU"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "trip-planner-ae59d.firebaseapp.com"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: "trip-planner-ae59d"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "trip-planner-ae59d.firebasestorage.app"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "251100343941"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:251100343941:web:1f0d3f79f86e27ad7203ec"
  NEXT_PUBLIC_FIREBASE_DATABASE_URL: ""

  # Firebase Admin SDK — project identifier and SA email for sync-env; private key is a Vercel secret
  FIREBASE_PROJECT_ID: "trip-planner-ae59d"
  FIREBASE_SA_EMAIL: "firebase-adminsdk-fbsvc@trip-planner-ae59d.iam.gserviceaccount.com"

