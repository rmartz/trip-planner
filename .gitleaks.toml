# gitleaks configuration
# https://github.com/gitleaks/gitleaks
#
# Extends vercel-deploy-scripts base ruleset (which itself extends the gitleaks
# default ruleset) with project-specific allowlists and rules.

title = "trip-planner"

[extend]
path = "node_modules/vercel-deploy-scripts/.gitleaks.toml"

[allowlist]
description = "Known safe patterns — placeholder values in documentation and config examples"
regexes = [
  # Placeholder values used in .env.example and documentation
  '''your-project-id''',
  '''your-project''',
  '''firebase-adminsdk-xxx''',
  # Example/truncated keys in ARCHITECTURE.md and README
  '''xxx@o\w+\.ingest\.sentry\.io''',
]
paths = [
  ".env.example",
  # deployment YAMLs contain only NEXT_PUBLIC_* and other non-secret keys
  # validated against schema.yml — gitleaks would produce false positives here
  '''deployment/.*\.yml''',
]

# Project-specific rules not covered by the vercel-deploy-scripts base ruleset

[[rules]]
id = "firebase-admin-key-id"
description = "Firebase service account private_key_id field"
regex = '''"private_key_id"\s*:\s*"[a-f0-9]{40}"'''
tags = ["firebase", "key"]
